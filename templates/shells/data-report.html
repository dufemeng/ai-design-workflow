<!doctype html>
<html lang="zh-CN" data-adw-template="data-report" data-adw-surface="report">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ADW · data-report shell</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-monospace, "JetBrains Mono", "PingFang SC", monospace; background: #0a0a0a; color: #e5e3d3; }
    main { max-width: 1080px; margin: 0 auto; padding: 32px 24px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin: 16px 0 24px; }
    .card { background: #14140b; border: 1px solid rgba(255,255,255,.08); border-radius: 6px; padding: 16px; }
    .card .n { font-size: 24px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <main>
    <h1><!-- ADW:TITLE -->gap report</h1>
    <div class="cards"><!-- ADW:SUMMARY --><div class="card"><div class="n">0</div><div>阻塞</div></div><div class="card"><div class="n">0</div><div>提醒</div></div></div>
    <table><thead><tr><th>维度</th><th>判定</th><th>证据</th></tr></thead><tbody><!-- ADW:ROWS --></tbody></table>
  </main>
</body>
</html>
